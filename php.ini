; PHP Configuration for DTF App (Hostinger Shared Hosting)
; Place this file in the root directory of your Laravel project

; Aumentar límites para descargas de imágenes pesadas
post_max_size = 50M
upload_max_filesize = 50M

; Tiempo de ejecución para procesar PNGs 150 DPI
max_execution_time = 300
max_input_time = 300

; Memoria para generación de imágenes
memory_limit = 256M

; Configuraciones adicionales de seguridad
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /home/cesar/projects/dtf/storage/logs/php-errors.log
